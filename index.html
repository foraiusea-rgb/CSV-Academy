<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#0D9488"/>
<title>CSV Academy — Pharma Validation Training</title>
<meta name="description" content="Free platform to master Computer System Validation for pharmaceutical careers in Ireland."/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F8FB;--surface:#FFFFFF;--surface2:#EEF1F6;--border:#DDE2EB;
  --text:#1A2332;--text2:#4A5568;--text3:#8896A6;
  --accent:#0D9488;--accent2:#14B8A6;--accent-bg:rgba(13,148,136,0.06);
  --warn:#DC2626;--warn-bg:rgba(220,38,38,0.06);
  --ok:#059669;--ok-bg:rgba(5,150,105,0.06);
  --purple:#7C3AED;--purple-bg:rgba(124,58,237,0.06);
  --blue:#2563EB;--blue-bg:rgba(37,99,235,0.06);
  --orange:#D97706;--orange-bg:rgba(217,119,6,0.06);
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px rgba(0,0,0,0.05),0 2px 4px rgba(0,0,0,0.04);
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* Mobile responsive */
@media(max-width:768px){
  header{padding:0 0.75rem !important}
  header nav{display:none !important}
  main{padding:0.75rem !important}
  .desktop-only{display:none !important}
  .mobile-nav{display:flex !important}
}
@media(min-width:769px){
  .mobile-nav{display:none !important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
